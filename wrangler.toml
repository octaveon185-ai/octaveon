# Cloudflare Pages configuration.
# Deploy: connect this repo in the Cloudflare dashboard (Pages) with
#   build command:  npm run build
#   output dir:     dist
#
# Secrets (set in Pages → Settings → Variables & Secrets, or via `wrangler pages secret put`):
#   RESEND_API_KEY     — Resend API key for sending invite emails
#   RESEND_FROM        — verified sender, e.g. "Octave On <invito@octaveon.xyz>"
#   NOTIFY_TO          — your address for new-signup notifications
#   TURNSTILE_SECRET   — Cloudflare Turnstile secret (anti-spam)
name = "octaveon"
compatibility_date = "2026-06-30"
pages_build_output_dir = "dist"

# Waitlist storage. Create with:
#   wrangler d1 create octaveon-waitlist
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "octaveon-waitlist"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
