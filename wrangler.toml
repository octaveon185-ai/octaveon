# Cloudflare Worker + Static Assets.
# Deploy command (set in the Cloudflare dashboard / Workers Build): `npx wrangler deploy`
#
# How it works:
#   [build]  runs `npm run build` (Astro) → produces ./dist
#   [assets] serves ./dist as the static site
#   main     is the Worker that handles /api/* and falls back to assets
#
# Secrets (Workers → Settings → Variables & Secrets, or `wrangler secret put`):
#   RESEND_API_KEY    — Resend API key for invite emails
#   RESEND_FROM       — verified sender, e.g. "Octave On <invito@octaveon.xyz>"
#   NOTIFY_TO         — your address for new-signup notifications
#   TURNSTILE_SECRET  — Cloudflare Turnstile secret (anti-spam)
# Build variable (so the form renders the Turnstile widget):
#   PUBLIC_TURNSTILE_SITEKEY

name = "octaveon"
main = "worker/index.ts"
compatibility_date = "2026-06-30"

[build]
command = "npm run build"

[assets]
directory = "./dist"
binding = "ASSETS"

# --- Waitlist storage: enable AFTER creating the D1 database ---
